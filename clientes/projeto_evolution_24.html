<!DOCTYPE html>
<html lang="pt-PT" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portal - Evolution Motors</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --bs-accent: #e65100; }
        body { background-color: #0f172a; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .form-control { background-color: #0f172a !important; color: #fff !important; border: 1px solid #334155; }
        .form-control:focus { border-color: var(--bs-accent) !important; box-shadow: none; }
        .btn-primary { background-color: var(--bs-accent); border: none; font-weight: bold; }
        .btn-primary:hover { background-color: #c94400; }
        
        .kpi-card { padding: 20px; border-radius: 12px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #334155; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        .os-box { background-color: #1e293b; padding: 20px; border-radius: 12px; border-left: 5px solid var(--bs-accent); margin-bottom: 20px; border-top: 1px solid #334155; border-right: 1px solid #334155; border-bottom: 1px solid #334155;}
        
        .chat-app { background-color: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; height: 400px; display: flex; flex-direction: column; }
        .chat-view { flex-grow: 1; padding: 15px; overflow-y: auto; background-color: #0f172a; }
        .msg { max-width: 85%; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 0.95rem; }
        .msg.cliente { background-color: var(--bs-accent); align-self: flex-end; margin-left: auto; border-bottom-right-radius: 0; }
        .msg.admin { background-color: #1e293b; align-self: flex-start; margin-right: auto; border-bottom-left-radius: 0; border: 1px solid #334155;}
        .msg small { display: block; text-align: right; opacity: 0.7; font-size: 0.7rem; margin-top: 4px; }
        .chat-send { display: flex; padding: 10px; background-color: #1e293b; border-top: 1px solid #334155; }
        
        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px;}
        .media-grid img, .media-grid video { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #334155; }
        
        .modal-content { background-color: #1e293b; color: white; border: 1px solid #334155; }
        .modal-header { border-bottom: 1px solid #334155; background-color: #0f172a; }
        .btn-close { filter: invert(1); }
    </style>
</head>
<body>
    <div id="loginScreen" class="d-flex flex-column justify-content-center align-items-center vh-100 p-3">
        <div class="text-center mb-4">
            <h1 style="color: var(--bs-accent); font-weight: 900; letter-spacing: 2px;"><i class="bi bi-hexagon-fill"></i> EVOLUTION</h1>
            <h5 class="text-white-50">Portal Exclusivo do Cliente</h5>
        </div>
        <div class="card p-4 w-100" style="max-width: 400px;">
            <form onsubmit="entrar(event)">
                <div class="mb-3">
                    <label class="form-label text-white-50 fw-bold small">E-mail Cadastrado</label>
                    <input type="email" class="form-control form-control-lg" id="loginEmail" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-white-50 fw-bold small">PIN de Acesso</label>
                    <input type="password" class="form-control form-control-lg" id="loginSenha" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-lg" id="btnEntrar">ACESSAR GARAGEM</button>
            </form>
        </div>
    </div>

    <div id="appPanel" class="flex-column" style="display: none; flex-grow: 1;">
        <nav class="navbar navbar-dark px-4 py-3" style="background-color: #1e293b !important; border-bottom: 2px solid var(--bs-accent);">
            <span class="navbar-brand fw-bold" style="color: #fff !important;"><i class="bi bi-speedometer me-2 text-warning"></i> Meu Portal</span>
            <button class="btn btn-outline-danger btn-sm fw-bold border-0" onclick="window.location.reload()"><i class="bi bi-power"></i> Sair</button>
        </nav>
        
        <div class="container mt-4 pb-5 flex-grow-1">
            <h3 id="boasVindas" class="mb-4 fw-bold"></h3>
            
            <div class="row g-4 mb-5">
                <div class="col-md-6">
                    <div class="kpi-card shadow-sm border-info">
                        <p class="text-white-50 fw-bold mb-2 small text-uppercase"><i class="bi bi-wallet2 text-info"></i> Investimento Global</p>
                        <h2 id="kpiGastoTotal" class="fw-bold mb-0 text-info">R$ 0,00</h2>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="kpi-card shadow-sm border-success" id="kpiAlerta">
                        <p class="text-white-50 fw-bold mb-2 small text-uppercase"><i class="bi bi-shield-check text-success"></i> Status da Manutenção</p>
                        <h2 id="kpiStatus" class="fw-bold mb-1 text-success">Sincronizando...</h2>
                        <small id="kpiSubStatus" class="text-white-50"></small>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-6">
                    <h4 class="mb-3 border-bottom border-secondary pb-2"><i class="bi bi-tools text-warning me-2"></i> Meus Serviços na Oficina</h4>
                    <div id="boxServicos" class="mb-5"></div>

                    <h4 class="mb-3 border-bottom border-secondary pb-2"><i class="bi bi-scooter text-info me-2"></i> Minhas Motos</h4>
                    <div class="row g-3" id="boxMotos"></div>
                </div>

                <div class="col-lg-6">
                    <h4 class="mb-3 border-bottom border-secondary pb-2"><i class="bi bi-chat-right-text text-primary me-2"></i> Canal Direto com o Mecânico</h4>
                    <div class="chat-app shadow-lg">
                        <div class="chat-view d-flex flex-column" id="chatAreaMsg"></div>
                        <div class="chat-send">
                            <input type="text" class="form-control rounded-pill px-3" id="chatInputMsg" placeholder="Escreva a sua mensagem...">
                            <button class="btn btn-primary rounded-circle ms-2 shadow" style="width: 45px; height: 45px;" onclick="enviarMensagem()"><i class="bi bi-send-fill"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Checklist e Fotos Cliente -->
    <div class="modal fade" id="modalChecklistCliente" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold"><i class="bi bi-clipboard2-data text-warning me-2"></i> Auditoria da Oficina</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 bg-dark" id="corpoLaudo"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAq6gEJlUGuzJmrNf-lVY0cqdOWsJ9xNeo", authDomain: "evolution-179d0.firebaseapp.com", projectId: "evolution-179d0", storageBucket: "evolution-179d0.firebasestorage.app", messagingSenderId: "349908951188", appId: "1:349908951188:web:457832d484a83f45b19481" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        
        let idMeuCliente = null; let meuTenant = null;
        let minhasMotos = []; let meusServicos = [];

        async function entrar(e) {
            e.preventDefault();
            const em = document.getElementById('loginEmail').value.trim();
            const pw = document.getElementById('loginSenha').value.trim();
            const btn = document.getElementById('btnEntrar');
            btn.innerHTML = "Sincronizando Nuvem..."; btn.disabled = true;

            try {
                const snapshot = await db.collection('clientes').where('email', '==', em).where('senhaProv', '==', pw).get();
                if (snapshot.empty) {
                    alert("Acesso Negado: E-mail ou PIN Incorretos.");
                    btn.innerHTML = "ACESSAR GARAGEM"; btn.disabled = false;
                } else {
                    const dados = snapshot.docs[0].data();
                    idMeuCliente = snapshot.docs[0].id;
                    meuTenant = dados.tenantId;
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('appPanel').style.display = 'flex';
                    document.getElementById('boasVindas').innerHTML = `Bem-vindo de volta, <span class="text-warning">${dados.nome}</span>!`;
                    
                    iniciarAppEmTempoReal();
                }
            } catch (err) { alert("Erro de rede."); btn.innerHTML = "ACESSAR GARAGEM"; btn.disabled = false; }
        }

        function iniciarAppEmTempoReal() {
            db.collection('motos').where('clienteId', '==', idMeuCliente).onSnapshot(snap => { minhasMotos = snap.docs.map(d=>({id: d.id, ...d.data()})); renderizarPainel(); });
            db.collection('servicos').where('clienteId', '==', idMeuCliente).onSnapshot(snap => { meusServicos = snap.docs.map(d=>({id: d.id, ...d.data()})); renderizarPainel(); });
            
            db.collection('mensagens').where('clienteId', '==', idMeuCliente).onSnapshot(snap => {
                let msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
                msgs.sort((a,b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));
                
                const area = document.getElementById('chatAreaMsg'); area.innerHTML = '';
                if(msgs.length === 0) {
                    area.innerHTML = '<div class="text-center text-white-50 mt-5"><i class="bi bi-chat-square-dots fs-1"></i><br>Envie a primeira mensagem para o seu mecânico.</div>';
                } else {
                    msgs.forEach(m => {
                        const time = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : 'agora';
                        area.innerHTML += `<div class="msg ${m.sender==='cliente'?'cliente shadow':'admin shadow'}">${m.text}<small>${time}</small></div>`;
                    });
                    area.scrollTop = area.scrollHeight;
                }
            });
        }

        function renderizarPainel() {
            const boxM = document.getElementById('boxMotos');
            if(minhasMotos.length === 0) boxM.innerHTML = '<div class="col-12"><p class="text-white-50 p-3 bg-dark rounded border border-secondary">Sem veículos vinculados.</p></div>';
            else {
                boxM.innerHTML = minhasMotos.map(m => `
                    <div class="col-12">
                        <div class="p-3 bg-dark rounded-4 border border-secondary d-flex align-items-center gap-3 shadow-sm">
                            <div class="p-3 rounded-circle bg-black border border-secondary"><i class="bi bi-scooter fs-2 text-white-50"></i></div>
                            <div>
                                <h5 class="fw-bold mb-1 text-info">${m.modelo}</h5>
                                <span class="badge bg-black border border-warning text-warning mb-1 px-2">${m.placa}</span>
                                <p class="text-white-50 mb-0 small fw-bold">KM Atual: ${m.km || '0'}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            const boxOS = document.getElementById('boxServicos');
            const osAndamento = meusServicos.filter(s => s.status !== 'Concluido' && s.status !== 'Cancelado');
            if(osAndamento.length === 0) boxOS.innerHTML = '<div class="p-4 bg-dark rounded-4 border border-secondary text-center text-white-50"><i class="bi bi-check-circle fs-1 text-success d-block mb-2"></i>A sua mota não se encontra na oficina.</div>';
            else {
                boxOS.innerHTML = osAndamento.map(os => {
                    const mot = minhasMotos.find(x=>x.id===os.motoId);
                    const btn = `<button class="btn btn-outline-info btn-sm w-100 fw-bold mt-3 py-2" onclick="abrirLaudo('${os.id}')"><i class="bi bi-search me-1"></i> Acompanhar Auditoria / Fotos</button>`;
                    return `
                    <div class="os-box shadow-lg position-relative overflow-hidden">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="fw-bold mb-0 text-white">${os.desc}</h5>
                        </div>
                        <span class="badge bg-warning text-dark mb-2 border border-warning">${os.status.toUpperCase()}</span>
                        <p class="text-info fw-bold mb-1"><i class="bi bi-scooter me-1"></i> ${mot?mot.placa:'-'} (${mot?mot.modelo:'-'})</p>
                        <p class="text-white-50 small mb-0"><i class="bi bi-calendar-check me-1"></i> Data de Ingresso: ${new Date(os.data).toLocaleDateString('pt-PT')}</p>
                        <p class="text-success fw-bold fs-4 mt-3 mb-0 border-top border-secondary pt-2">Custo Atual: R$ ${os.total.toFixed(2)}</p>
                        ${btn}
                    </div>`;
                }).join('');
            }

            const gastoHistorico = meusServicos.filter(s=>s.status==='Concluido').reduce((acc, os) => acc + os.total, 0);
            document.getElementById('kpiGastoTotal').innerText = `R$ ${gastoHistorico.toFixed(2)}`;

            let temAtraso = false;
            meusServicos.filter(s=>s.status==='Concluido').forEach(os => {
                if( (new Date() - new Date(os.data)) / (1000*60*60*24*30) > 6 ) temAtraso = true;
            });

            const cardAlerta = document.getElementById('kpiAlerta');
            if(temAtraso) {
                cardAlerta.classList.remove('border-success'); cardAlerta.classList.add('border-danger');
                document.getElementById('kpiStatus').className = "fw-bold mb-1 text-danger";
                document.getElementById('kpiStatus').innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Manutenção Vencida';
                document.getElementById('kpiSubStatus').innerText = "Há mais de 6 meses que não faz a revisão recomendada.";
            } else {
                cardAlerta.classList.remove('border-danger'); cardAlerta.classList.add('border-success');
                document.getElementById('kpiStatus').className = "fw-bold mb-1 text-success";
                document.getElementById('kpiStatus').innerHTML = '<i class="bi bi-shield-check"></i> Seguro e em Dia';
                document.getElementById('kpiSubStatus').innerText = "O seu veículo cumpre as normas de segurança.";
            }
        }

        window.abrirLaudo = function(idOs) {
            const os = meusServicos.find(x=>x.id===idOs);
            if(!os || !os.check) return;
            const chk = os.check;
            
            // Render KPI Pneus (SaaS Feature)
            const getKpiHtml = (val, title) => {
                let cor = 'success'; if(val < 50) cor = 'warning'; if(val < 20) cor = 'danger';
                return `<div class="mb-3"><div class="d-flex justify-content-between small fw-bold text-white-50"><span>${title}</span><span>${val}%</span></div><div class="progress bg-black border border-secondary" style="height:10px;"><div class="progress-bar bg-${cor}" style="width: ${val}%"></div></div></div>`;
            };

            const checkIcon = (val) => val ? '<i class="bi bi-check-circle-fill text-success fs-5"></i>' : '<i class="bi bi-x-circle-fill text-danger fs-5"></i>';
            
            let mediaHtml = '';
            if(os.media && os.media.length > 0) {
                mediaHtml = `<h6 class="text-info fw-bold mt-4 mb-2"><i class="bi bi-camera me-1"></i> Galeria de Provas Oficinais</h6><div class="media-grid">` + os.media.map(m => {
                    return m.type === 'video' ? `<video src="${m.url}" controls></video>` : `<img src="${m.url}" onclick="window.open('${m.url}','_blank')">`;
                }).join('') + `</div>`;
            }

            document.getElementById('corpoLaudo').innerHTML = `
                <div class="p-3 bg-black rounded-4 border border-secondary mb-4 shadow-sm"><p class="mb-0 fw-bold"><i class="bi bi-fuel-pump text-info me-2"></i> Depósito: <span class="text-white-50">${chk.comb}</span></p></div>
                
                <h6 class="text-warning fw-bold mb-3"><i class="bi bi-speedometer2 me-1"></i> Desgaste de Borracha (Pneus)</h6>
                <div class="p-3 bg-black rounded-4 border border-secondary mb-4 shadow-sm">
                    ${getKpiHtml(chk.pneuDia || 0, 'Pneu Dianteiro')}
                    ${getKpiHtml(chk.pneuTra || 0, 'Pneu Traseiro')}
                </div>

                <h6 class="text-warning fw-bold mb-3"><i class="bi bi-list-check me-1"></i> Auditoria Base</h6>
                <div class="p-3 bg-black rounded-4 border border-secondary mb-4 shadow-sm">
                    <div class="d-flex align-items-center mb-3 border-bottom border-secondary pb-2">${checkIcon(chk.painel)} <span class="ms-2 fw-bold text-white-50">Eletrónica / Painel</span></div>
                    <div class="d-flex align-items-center mb-3 border-bottom border-secondary pb-2">${checkIcon(chk.pneus)} <span class="ms-2 fw-bold text-white-50">Pressão Pneus</span></div>
                    <div class="d-flex align-items-center mb-2">${checkIcon(chk.care)} <span class="ms-2 fw-bold text-white-50">Carenagens OK</span></div>
                </div>

                <div class="p-3 bg-black rounded-4 border border-danger mb-2 shadow-sm">
                    <p class="text-danger fw-bold mb-2"><i class="bi bi-shield-exclamation me-1"></i> Declaração de Danos Prévios:</p>
                    <p class="text-white-50 fst-italic mb-0 small">"${chk.obs || 'Veículo imaculado. Nenhuma avaria prévia apontada pelo técnico.'}"</p>
                </div>
                ${mediaHtml}
            `;
            new bootstrap.Modal(document.getElementById('modalChecklistCliente')).show();
        };

        window.enviarMensagem = async function() {
            const val = document.getElementById('chatInputMsg').value.trim();
            if(!val) return;
            await db.collection('mensagens').add({ tenantId: meuTenant, clienteId: idMeuCliente, sender: 'cliente', text: val, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('chatInputMsg').value = '';
        }
    </script>
</body>
</html>
